services:
  - type: web
    name: jobnimbus-mcp
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: JOBNIMBUS_API_KEY
        sync: false        # Render will prompt you to enter this — never commit your API key
      - key: NODE_ENV
        value: production
