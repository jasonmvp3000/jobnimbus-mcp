services:
  - type: web
    name: jobnimbus-mcp
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: JOBNIMBUS_API_KEY
        sync: false
      - key: MCP_SECRET
        sync: false
      - key: NODE_ENV
        value: production
